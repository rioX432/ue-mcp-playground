; Project defaults for the official UE 5.8 Unreal MCP plugin.
; UModelContextProtocolSettings (module ModelContextProtocolEngine, config=EditorPerProjectUserSettings).
; bAutoStartServer=True makes the HTTP server register its route and start its
; listeners during module startup, so the editor exposes http://127.0.0.1:8000/mcp
; on every launch WITHOUT a manual `ModelContextProtocol.StartServer` console call.
; This is what lets the autonomous MCP loop survive editor restarts unattended.
[/Script/ModelContextProtocolEngine.ModelContextProtocolSettings]
bAutoStartServer=True
ServerPortNumber=8000
ServerUrlPath=/mcp
bEnableToolSearch=True
